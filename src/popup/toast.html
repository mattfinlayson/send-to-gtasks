<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Save</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: transparent;
      pointer-events: none;
    }

    #toast {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: #323232;
      color: #fff;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.24);
      font-size: 14px;
      max-width: 280px;
      animation: slideIn 0.2s ease-out;
    }

    #toast.success {
      border-left: 4px solid #34a853;
    }

    #toast.error {
      border-left: 4px solid #ea4335;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeOut {
      from {
        opacity: 1;
      }
      to {
        opacity: 0;
      }
    }

    #toast.fade-out {
      animation: fadeOut 0.2s ease-in forwards;
    }
  </style>
</head>
<body>
  <div id="toast" class="success">
    <span id="message">Task created</span>
  </div>
  <script type="module" src="toast.ts"></script>
</body>
</html>
