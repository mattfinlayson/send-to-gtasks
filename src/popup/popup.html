<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Send to Google Tasks</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="popup-container">
    <!-- Header -->
    <header class="header">
      <div class="header-brand">
        <img src="../../icons/icon-48.png" alt="" class="header-icon" width="32" height="32">
        <h1 class="header-title">Send to Google Tasks</h1>
      </div>
    </header>

    <!-- Auth state (not signed in) -->
    <div id="auth-container" class="hidden">
      <div class="section-label">Account</div>
      <div class="card">
        <p class="auth-prompt">Sign in to save tasks to your Google account</p>
        <button id="signin-button" class="google-sign-in">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Sign in with Google
        </button>
      </div>
    </div>

    <!-- Form for task creation -->
    <form id="task-form" class="task-form hidden">
      <label for="notes-input" class="section-label">Notes (optional)</label>
      <div class="card notes-card">
        <textarea
          id="notes-input"
          class="notes-input"
          placeholder="Add notes..."
          rows="3"
          maxlength="1024"
          aria-describedby="notes-counter"
        ></textarea>
        <div id="notes-counter" class="char-counter">0/1024</div>
      </div>

      <label for="due-date-picker" class="section-label">Due date (optional)</label>
      <div class="card">
        <input
          type="date"
          id="due-date-picker"
          class="date-input"
          aria-describedby="date-warning"
        >
        <div id="date-warning" class="date-warning hidden">Note: Date is in the past</div>
      </div>

      <div class="form-actions">
        <button type="submit" id="save-button" class="save-button">Save Task</button>
      </div>
    </form>

    <!-- Loading state -->
    <div id="loading-container" class="loading-container hidden">
      <div class="status">
        <div class="status-icon" aria-hidden="true"></div>
        <div id="loading-message" class="status-message">Creating task...</div>
      </div>
    </div>

    <!-- Error display -->
    <div id="error-container" class="error-container hidden">
      <div id="error-message" class="error-message"></div>
      <button id="retry-button" class="retry-button" aria-label="Retry creating task">Retry</button>
    </div>

    <!-- Success display -->
    <div id="success-container" class="success-container hidden">
      <div id="success-icon" class="success-icon" aria-hidden="true">&#10003;</div>
      <div id="success-message" class="success-message">Task created!</div>
    </div>
  </div>

  <script type="module" src="popup.ts"></script>
</body>
</html>
