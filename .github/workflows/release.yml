name: Release

on:
  release:
    types: [published]

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate version matches tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          MANIFEST_VERSION=$(grep -o '"version": "[^"]*"' src/manifest.json | cut -d'"' -f4)
          echo "Tag version: $TAG_VERSION"
          echo "Manifest version: $MANIFEST_VERSION"
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) != Manifest version ($MANIFEST_VERSION)"
            exit 1
          fi

      - name: Build and package
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          npm run build
          cd dist && zip -r "../send-to-gtasks-extension-v${TAG_VERSION}.zip" . && cd ..

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: send-to-gtasks-extension-v*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
